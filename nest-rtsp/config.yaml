name: "Nest RTSP"
description: "Direct 1080p 30fps RTSP from Google Nest cameras — no Chrome, no cloud relay"
version: "1.2.2"
slug: nest-rtsp
url: "https://github.com/nalditopr/nest-rtsp"
init: false
arch:
  - amd64
host_network: true
panel_icon: "mdi:cctv"
map:
  - addon_config:rw
  - share:rw
options:
  rtsp_port: 8555
  cameras: []
  cookies_json: ""
schema:
  rtsp_port: int(1024,65535)?
  cameras:
    - name: str
      device_id: str
      resolution: int(0,3)?
  cookies_json: str?
